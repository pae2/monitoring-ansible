---
- name: Ensure required base packages are present
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
    state: present
    update_cache: true

- name: Check if Docker is installed
  command: docker --version
  register: docker_check
  failed_when: false
  changed_when: false

- name: Ensure /etc/apt/keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: docker_check.rc != 0

- name: Add Docker GPG apt key
  get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  when: docker_check.rc != 0

- name: Add Docker repository to apt
  apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64','amd64') | replace('aarch64','arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  when: docker_check.rc != 0

- name: Install Docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  when: docker_check.rc != 0

- name: Ensure Docker is running and enabled
  service:
    name: docker
    state: started
    enabled: true

- name: Create monitoring network
  community.docker.docker_network:
    name: "{{ monitoring_network }}"
    state: present

- name: Create data directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ node_exporter_data_dir }}"
    - "{{ cadvisor_data_dir }}"

- name: Ensure /opt/monitoring exists
  file:
    path: /opt/monitoring
    state: directory
    mode: "0755"

- name: Deploy docker-compose.yml
  template:
    src: compose.yml.j2
    dest: /opt/monitoring/compose.yml
    mode: "0644"
  register: compose_file

- name: Start/refresh monitoring containers
  community.docker.docker_compose_v2:
    project_src: /opt/monitoring
    state: present
    pull: "{{ 'always' if compose_file.changed else 'missing' }}"

# --- Firewall: restrict node-exporter & cadvisor by IP ---
#
# node-exporter: network_mode: host -> слушает порт напрямую на хосте,
#   трафик идёт через INPUT.
# cadvisor: опубликован через "ports:" в bridge-сети -> трафик идёт
#   через DNAT/FORWARD, фильтруем в DOCKER-USER.

- name: Ensure iptables is installed
  package:
    name: iptables
    state: present
  when: firewall_backend == "iptables"

- name: Ensure DOCKER-USER chain exists
  iptables:
    chain: DOCKER-USER
    chain_management: true
    state: present
  when: firewall_backend == "iptables"

### node-exporter (host network -> INPUT)

- name: Allow node-exporter from trusted IPs
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ node_exporter_port }}"
    source: "{{ item }}"
    jump: ACCEPT
    action: insert
    rule_num: 1
    state: present
  loop: "{{ node_exporter_allowed_ips }}"
  when: firewall_backend == "iptables"

- name: Drop other access to node-exporter
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ node_exporter_port }}"
    jump: DROP
    action: append
    state: present
  when: firewall_backend == "iptables"

### cadvisor (bridge + ports: -> DOCKER-USER)

- name: Allow cadvisor from trusted IPs
  iptables:
    chain: DOCKER-USER
    protocol: tcp
    destination_port: "{{ cadvisor_port }}"
    source: "{{ item }}"
    jump: ACCEPT
    action: insert
    rule_num: 1
    state: present
  loop: "{{ cadvisor_allowed_ips }}"
  when: firewall_backend == "iptables"

- name: Drop other access to cadvisor
  iptables:
    chain: DOCKER-USER
    protocol: tcp
    destination_port: "{{ cadvisor_port }}"
    jump: DROP
    action: append
    state: present
  when: firewall_backend == "iptables"

- name: Ensure DOCKER-USER traffic falls through to docker chains
  iptables:
    chain: DOCKER-USER
    jump: RETURN
    action: append
    state: present
  when: firewall_backend == "iptables"

- name: Ensure iptables persistent directory exists
  file:
    path: /etc/iptables
    state: directory
    mode: "0755"
  when: firewall_backend == "iptables"

- name: Save iptables rules
  shell: |
    iptables-save | grep -v '^#' > /tmp/rules.v4.new
    if ! cmp -s /tmp/rules.v4.new /etc/iptables/rules.v4; then
      cp /tmp/rules.v4.new /etc/iptables/rules.v4
      echo changed
    fi
    rm -f /tmp/rules.v4.new
  register: iptables_save
  changed_when: "'changed' in iptables_save.stdout"
  when: firewall_backend == "iptables"