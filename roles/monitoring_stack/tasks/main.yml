---
- name: Assert supported OS family
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'Debian'
    fail_msg: "monitoring_stack supports Debian/Ubuntu only (got {{ ansible_os_family }})"
  tags: [always]

- name: Install Docker
  ansible.builtin.import_tasks: install_docker.yml
  tags: [docker, install]

- name: Deploy monitoring containers
  ansible.builtin.import_tasks: deploy.yml
  tags: [deploy]

- name: Configure firewall
  ansible.builtin.import_tasks: firewall.yml
  when: firewall_enabled | bool
  tags: [firewall]
