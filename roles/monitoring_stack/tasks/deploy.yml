---
- name: Create monitoring network
  community.docker.docker_network:
    name: "{{ monitoring_network }}"
    state: present

- name: Ensure compose project directory exists
  ansible.builtin.file:
    path: "{{ monitoring_compose_dir }}"
    state: directory
    mode: "0755"

- name: Deploy compose.yml
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ monitoring_compose_dir }}/compose.yml"
    mode: "0644"
  register: compose_file

- name: Start/refresh monitoring containers
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_compose_dir }}"
    state: present
    pull: "{{ 'always' if compose_file.changed else 'missing' }}"
